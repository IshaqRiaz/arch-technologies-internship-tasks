<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 10px;
            margin: 5px;
            width: 90%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .task {
            text-align: left;
            background: #f9f9f9;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        a {
            margin-left: 10px;
            text-decoration: none;
            color: blue;
        }

        a:hover {
            text-decoration: underline;
        }

        .filter-section {
            margin-top: 15px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>To-Do List</h1>

    <!-- Add Task -->
    <form action="/add" method="post">
        <input type="text" name="task" placeholder="Enter task" required>
        
        <select name="category">
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
        </select>
        
        <button type="submit">Add Task</button>
    </form>

    <!-- Filter -->
    <div class="filter-section">
        <form action="/filter" method="post">
            <select name="category">
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <a href="/">Show All Tasks</a>
    </div>

    <hr>

    <!-- Task List -->
    {% for task in tasks %}
        <div class="task">
            <span class="{% if task.Status == 'Completed' %}completed{% endif %}">
                {{ loop.index }}. {{ task.task }} 
                [{{ task.category }}] - {{ task.Status }}
            </span>

            <br>

            <a href="/complete/{{ loop.index0 }}">Complete</a>
            <a href="/delete/{{ loop.index0 }}">Delete</a>
        </div>
    {% endfor %}

</div>

</body>
</html>
